<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Forceful substitution for Times -->
  <match target="pattern">
    <test name="family" compare="eq"><string>Times</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Tinos</string></edit>
  </match>

  <!-- Forceful substitution for Times New Roman -->
  <match target="pattern">
    <test name="family" compare="eq"><string>Times New Roman</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Tinos</string></edit>
  </match>

  <!-- Forceful substitution for Helvetica -->
  <match target="pattern">
    <test name="family" compare="eq"><string>Helvetica</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Arimo</string></edit>
  </match>

  <!-- Forceful substitution for Arial -->
  <match target="pattern">
    <test name="family" compare="eq"><string>Arial</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Arimo</string></edit>
  </match>

  <!-- Forceful substitution for Lucida Grande -->
  <match target="pattern">
    <test name="family" compare="eq"><string>Lucida Grande</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Arimo</string></edit>
  </match>

  <!-- Forceful substitution for Courier -->
  <match target="pattern">
    <test name="family" compare="eq"><string>Courier</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Cousine</string></edit>
  </match>

  <!-- Forceful substitution for Courier New -->
  <match target="pattern">
    <test name="family" compare="eq"><string>Courier New</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Cousine</string></edit>
  </match>

  <!-- Forceful substitution for Monaco -->
  <match target="pattern">
    <test name="family" compare="eq"><string>Monaco</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Cousine</string></edit>
  </match>

  <!-- Forceful substitution for Georgia -->
  <match target="pattern">
    <test name="family" compare="eq"><string>Georgia</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Gelasio</string></edit>
  </match>

  <!-- Forceful substitution for Comic Sans MS -->
  <match target="pattern">
    <test name="family" compare="eq"><string>Comic Sans MS</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Comic Relief</string></edit>
  </match>

  <!-- Forceful substitution for Segoe UI -->
  <match target="pattern">
    <test name="family" compare="eq"><string>Segoe UI</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Selawik</string></edit>
  </match>

  <!-- Forceful substitution for Calibri -->
  <match target="pattern">
    <test name="family" compare="eq"><string>Calibri</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Carlito</string></edit>
  </match>

  <!-- Forceful substitution for Cambria -->
  <match target="pattern">
    <test name="family" compare="eq"><string>Cambria</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Caladea</string></edit>
  </match>

  <!-- Forceful substitution for Candara -->
  <match target="pattern">
    <test name="family" compare="eq"><string>Candara</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Cantarell</string></edit>
  </match>

  <!-- Forceful substitution for Consolas -->
  <match target="pattern">
    <test name="family" compare="eq"><string>Consolas</string></test>
    <edit name="family" mode="assign" binding="strong"><string>Inconsolata</string></edit>
  </match>
</fontconfig>
