minTlsServeVersion: 1.3

upstreams:
  groups:
    default:
      - quic:linux-2edbed.dns.nextdns.io # nextdns-mine-alt
      - tcp-tls:one.one.one.one
      # - quic:linux-8d4e37.dns.nextdns.io # nextdns-mine
      # - quic:linux-624e15.dns.nextdns.io # nextdns-block
  strategy: strict

bootstrapDns:
  - tcp+udp:1.1.1.1
  - https://1.1.1.1/dns-query

hostsFile:
  sources:
    - /etc/hosts

dnssec:
  validate: true

conditional:
  mapping:
    tailddb21.ts.net: 100.100.100.100
